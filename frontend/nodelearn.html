<!DOCTYPE html>
<html>
<head>
    <title>Learn Node.js</title>
    <link rel="stylesheet" href="learn.css">
    <style>

        .main-container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        /* Video Section */
        .video-section {
            flex: 3;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .video-section iframe {
            width: 100%;
            height: 400px;
            border-radius: 10px;
        }

        /* Sidebar */
        .playlist {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .playlist h3 {
            margin-bottom: 10px;
        }

        .video-item {
            padding: 10px;
            margin-bottom: 10px;
            background: #f4f4f4;
            border-radius: 5px;
            cursor: pointer;
        }

        .video-item:hover {
            background: #ddd;
        }

        .active {
            background: #333;
            color: white;
        }

        .progress {
            margin-top: 10px;
            height: 8px;
            background: #ddd;
            border-radius: 5px;
        }

        .progress-bar {
            height: 8px;
            width: 0%;
            background: green;
            border-radius: 5px;
        }

    </style>
</head>

<body>

<div class="course-header">
    <h1>Node.js Learning 🌐</h1>
    <p>Learn backend development step by step</p>
</div>

<div class="main-container">

    <!-- Video Player -->
    <div class="video-section">
        <iframe id="mainVideo"
        src="https://www.youtube.com/embed/TlB_eWDSMt4">
        </iframe>

        <h3 id="videoTitle">Node.js Full Course</h3>

        <!-- Progress Bar -->
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- Playlist -->
    <div class="playlist">
        <h3>Lessons 📚</h3>

        <div class="video-item active"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/TlB_eWDSMt4', 20)">
            Node.js Introduction
        </div>

        <div class="video-item"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/fBNz5xF-Kx4', 40)">
            Node.js Basics
        </div>

        <div class="video-item"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/Oe421EPjeBE', 60)">
            Express.js Setup
        </div>

        <div class="video-item"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/fgTGADljAeg', 80)">
            REST API Development
        </div>

        <div class="video-item"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/ENrzD9HAZK4', 100)">
            Node.js Project
        </div>

    </div>

</div>

<center>
<button onclick="location.href='courses.html'">⬅ Back to Courses</button>
</center>

<script>

function changeVideo(element, videoUrl, progress) {

    // Change video
    document.getElementById("mainVideo").src = videoUrl;

    // Change title
    document.getElementById("videoTitle").innerText = element.innerText;

    // Highlight active
    let items = document.querySelectorAll(".video-item");
    items.forEach(item => item.classList.remove("active"));
    element.classList.add("active");

    // Update progress
    document.getElementById("progressBar").style.width = progress + "%";
}

</script>

</body>
</html>
