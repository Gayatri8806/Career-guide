<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Career Guidance</title>
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="container">

    <div class="login-box">
        <h2>Student Login</h2>

        <p id="errorMsg" style="color:red; display:none;"></p>

        <form onsubmit="return loginUser(event)">

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label>Password</label>
            <div class="password-box">
                <input type="password" id="password" placeholder="Enter password" required>
                <span onclick="togglePassword()">👁</span>
            </div>

            <label>Captcha</label>
            <div class="captcha-box">
                <input type="text" id="captchaInput" placeholder="Enter captcha" required>

                <div class="captcha">
                    <span id="captchaText"></span>
                    <button type="button" onclick="generateCaptcha()">🔄</button>
                </div>
            </div>

            <button type="submit" class="login-btn-main" id="btn">Login</button>

            <br><br>
            <a href="register.html">Create new account</a>

        </form>
    </div>

</div>

<script>

/* ================= PASSWORD TOGGLE ================= */
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

/* ================= CAPTCHA GENERATOR ================= */
function generateCaptcha() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let captcha = "";

    for (let i = 0; i < 5; i++) {
        captcha += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("captchaText").innerText = captcha;
}

/* generate captcha on page load */
window.onload = generateCaptcha;

/* ================= LOGIN ================= */
async function loginUser(event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const captchaInput = document.getElementById("captchaInput").value.trim();
    const captchaText = document.getElementById("captchaText").innerText.trim();

    const errorMsg = document.getElementById("errorMsg");
    const btn = document.getElementById("btn");

    errorMsg.style.display = "none";

    /* CAPTCHA CHECK */
    if (captchaInput !== captchaText) {
        errorMsg.innerText = "Invalid captcha ❌";
        errorMsg.style.display = "block";
        generateCaptcha();
        return;
    }

    btn.disabled = true;
    btn.innerText = "Logging in...";

    try {
        const res = await fetch("http://localhost:5000/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        /* SUCCESS LOGIN */
        if (data.success) {

            localStorage.setItem("loggedInUser", email);
            localStorage.setItem("loggedIn", "true");

            alert("Login successful 🎉");

            window.location.href = "Home.html";
        } 
        else {
            errorMsg.innerText = data.message || "Invalid email or password ❌";
            errorMsg.style.display = "block";
            generateCaptcha();
        }

    } catch (error) {
        console.log(error);
        errorMsg.innerText = "Server not reachable ❌";
        errorMsg.style.display = "block";
    }

    btn.disabled = false;
    btn.innerText = "Login";
}

</script>

</body>
</html>
