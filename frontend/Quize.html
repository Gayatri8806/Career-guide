// 🔥 LOAD QUIZ (NO CHANGE)
function loadQuiz() {

    const subject = document.getElementById("subjectSelect").value;
    const container = document.getElementById("quizContainer");

    container.innerHTML = "";

    if (!quizData[subject]) return;

    quizData[subject].forEach((item, index) => {

        let html = `<div class="question">
            <p>${index + 1}. ${item.q}</p>`;

        item.options.forEach(opt => {
            html += `
                <input type="radio" name="q${index}" value="${opt}"> ${opt}<br>
            `;
        });


        html += `</div>`;

        container.innerHTML += html;
    });
}

// 🔥 SUBMIT QUIZ (UPDATED LOGIC)
function submitQuiz() {

    const subject = document.getElementById("subjectSelect").value;

    if (!subject) {
        alert("Select subject first!");
        return;
    }

    let questions = quizData[subject];
    let score = 0;

    // ✅ CHECK ANSWERS
    questions.forEach((q, index) => {
        let selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected && selected.value === q.answer) {
            score++;
        }
    });

    let percent = Math.round((score / questions.length) * 100);

    // ✅ NEW CLEAN DATA STRUCTURE
    let courses = JSON.parse(localStorage.getItem("courses")) || [];

    let found = false;

    courses = courses.map(c => {
        if (c.name === subject) {
            found = true;
            return {
                ...c,
                courseStatus: "completed",
                quizStatus: "completed",
                score: percent,
                certificate: percent >= 40
            };
        }
        return c;
    });

    if (!found) {
        courses.push({
            name: subject,
            courseStatus: "completed",
            quizStatus: "completed",
            score: percent,
            certificate: percent >= 40
        });
    }

    localStorage.setItem("courses", JSON.stringify(courses));

    // 🎯 RESULT
    let msg = percent >= 40 ? "Passed ✅" : "Failed ❌";

    document.getElementById("result").innerText = `Score: ${percent}% (${msg})`;

    // 🚀 REDIRECT
    setTimeout(() => {
        if (percent >= 40) {
            window.location.href = "certificate.html";
        } else {
            window.location.href = "progress.html";
        }
    }, 2000);
}
