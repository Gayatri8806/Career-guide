<!DOCTYPE html>
<html>
<head>
    <title>Learn HTML</title>
    <link rel="stylesheet" href="learn.css">

    <style>

        .main-container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        /* Video Section */
        .video-section {
            flex: 3;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .video-section iframe {
            width: 100%;
            height: 400px;
            border-radius: 10px;
        }

        /* Sidebar */
        .playlist {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .playlist h3 {
            margin-bottom: 10px;
        }

        .video-item {
            padding: 10px;
            margin-bottom: 10px;
            background: #f4f4f4;
            border-radius: 5px;
            cursor: pointer;
        }

        .video-item:hover {
            background: #ddd;
        }

        .active {
            background: #333;
            color: white;
        }

        .progress {
            margin-top: 10px;
            height: 8px;
            background: #ddd;
            border-radius: 5px;
        }

        .progress-bar {
            height: 8px;
            width: 0%;
            background: green;
            border-radius: 5px;
        }

    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <h2>CareerGuide</h2>
    <ul>
        <li onclick="location.href='course.html'">Courses</li>
        <li><button onclick="logout()">Logout</button></li>
    </ul>
</nav>

<!-- Header -->
<div class="course-header">
    <h1>HTML Learning 🚀</h1>
    <p>Start your web development journey</p>
</div>

<div class="main-container">

    <!-- Video Player -->
    <div class="video-section">
        <iframe id="mainVideo"
        src="https://www.youtube.com/embed/qz0aGYrrlhU">
        </iframe>

        <h3 id="videoTitle">HTML Introduction</h3>

        <!-- Progress -->
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- Playlist -->
    <div class="playlist">
        <h3>Lessons 📚</h3>

        <div class="video-item active"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/qz0aGYrrlhU', 20)">
            HTML Introduction
        </div>

        <div class="video-item"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/UB1O30fR-EE', 40)">
            HTML Basics
        </div>

        <div class="video-item"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/kUMe1FH4CHE', 60)">
            HTML Elements
        </div>

        <div class="video-item"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/fNcJuPIZ2WE', 80)">
            HTML Forms
        </div>

        <div class="video-item"
        onclick="changeVideo(this, 'https://www.youtube.com/embed/pQN-pnXPaVg', 100)">
            HTML Project
        </div>

    </div>

</div>

<center>
<button onclick="location.href='course.html'">⬅ Back to Courses</button>
</center>

<script>

function changeVideo(element, videoUrl, progress) {

    document.getElementById("mainVideo").src = videoUrl;
    document.getElementById("videoTitle").innerText = element.innerText;

    let items = document.querySelectorAll(".video-item");
    items.forEach(item => item.classList.remove("active"));
    element.classList.add("active");

    document.getElementById("progressBar").style.width = progress + "%";
}

function logout(){
    window.location.href="login.html";
}

</script>

</body>
</html>
